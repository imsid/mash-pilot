services:
  - type: web
    name: pilot
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MASH_DATABASE_URL
        fromDatabase:
          name: pilot-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PILOT_WORKSPACE_ROOT
        value: /opt/mashpy
      - key: GITHUB_MCP_URL
        value: https://api.githubcopilot.com/mcp/
      - key: GITHUB_MCP_PAT
        sync: false
      - key: MASH_HOST_APP
        value: pilot.spec:build_pool

databases:
  - name: pilot-db
    plan: basic-256mb
    databaseName: mash_pilot
    user: mash
